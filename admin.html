<!-- САЧУВАЈ КАО: admin.html -->
<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZEN Admin | Резервације</title>
  <meta name="theme-color" content="#07110b" />
  <style>
    :root{
      --bg:#07110b;
      --panel:#0d1b14;
      --panel-2:#11241a;
      --card:#13291d;
      --line:rgba(255,255,255,.10);
      --text:#f3f7f4;
      --muted:#b9c7be;
      --green:#1fa463;
      --red:#c44141;
      --yellow:#d4a72c;
      --blue:#2b7fff;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(43,127,255,.10), transparent 22%),
        radial-gradient(circle at top left, rgba(31,164,99,.10), transparent 22%),
        linear-gradient(180deg, #07110b 0%, #0a1610 100%);
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      width:min(1100px, 94%);
      margin:0 auto;
      padding:18px 0 40px;
    }

    .top{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .brand{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px 16px;
      box-shadow:var(--shadow);
      min-width:280px;
    }

    .brand h1{
      margin:0 0 6px;
      font-size:22px;
      line-height:1.15;
      letter-spacing:.4px;
    }

    .brand p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button, .btn{
      border:none;
      border-radius:14px;
      padding:12px 14px;
      font-weight:700;
      color:#fff;
      background:var(--blue);
      cursor:pointer;
      box-shadow:var(--shadow);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
    }

    button.secondary, .btn.secondary{
      background:#24392c;
      border:1px solid var(--line);
      color:#fff;
    }

    button.green{background:var(--green)}
    button.red{background:var(--red)}
    button.yellow{background:var(--yellow); color:#151515}

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
      backdrop-filter: blur(6px);
    }

    .filters{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr 1fr;
      gap:10px;
    }

    input, select{
      width:100%;
      min-height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:#fff;
      padding:0 14px;
      outline:none;
      font-size:15px;
    }

    input::placeholder{color:#b8c2bb}

    .stats{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      margin-top:12px;
    }

    .stat{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }

    .stat .k{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .stat .v{
      font-size:24px;
      font-weight:800;
    }

    .info-line{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, #112218, #0f1c15);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .card-top{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .who{
      min-width:0;
    }

    .who h3{
      margin:0 0 6px;
      font-size:18px;
      word-break:break-word;
    }

    .who .phone{
      color:var(--muted);
      font-size:14px;
      word-break:break-word;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.08);
    }

    .badge.pending{background:rgba(212,167,44,.16); color:#ffd86b}
    .badge.approved{background:rgba(31,164,99,.16); color:#7dffb9}
    .badge.rejected{background:rgba(196,65,65,.16); color:#ff9b9b}

    .grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      margin-bottom:12px;
    }

    .box{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      min-height:68px;
    }

    .box .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .box .value{
      font-size:15px;
      font-weight:700;
      word-break:break-word;
    }

    .note{
      background:#0d1913;
      border:1px dashed var(--line);
      border-radius:14px;
      padding:10px 12px;
      color:#dce7df;
      font-size:14px;
      margin-bottom:12px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .row-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .row-actions button{
      flex:1 1 140px;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:28px 10px;
      border:1px dashed var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.03);
    }

    .loading{
      text-align:center;
      padding:20px;
      color:#fff;
    }

    .footer-note{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    @media (max-width: 900px){
      .filters{grid-template-columns:1fr 1fr}
      .stats{grid-template-columns:1fr 1fr}
      .grid{grid-template-columns:1fr 1fr}
    }

    @media (max-width: 560px){
      .wrap{width:min(96%, 96%)}
      .brand h1{font-size:20px}
      .filters{grid-template-columns:1fr}
      .stats{grid-template-columns:1fr 1fr}
      .grid{grid-template-columns:1fr}
      .card-top{flex-direction:column; align-items:flex-start}
      .row-actions button{flex:1 1 100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <h1>ZEN ADMIN PANEL</h1>
        <p>Преглед и одобравање резервација са телефона или рачунара</p>
      </div>

      <div class="actions">
        <button class="secondary" id="btnRefresh">Освежи</button>
        <a class="btn secondary" href="./index.html">Назад на сајт</a>
      </div>
    </div>

    <div class="panel">
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Претрага: име, телефон, датум, време..." />
        <select id="statusFilter">
          <option value="">Сви статуси</option>
          <option value="NA ČEKANJU">На чекању</option>
          <option value="ODOBRENO">Одобрено</option>
          <option value="ODBIJENO">Одбијено</option>
        </select>
        <input type="date" id="dateFilter" />
        <select id="sortFilter">
          <option value="newest">Најновије прво</option>
          <option value="oldest">Најстарије прво</option>
        </select>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">Укупно</div>
          <div class="v" id="statTotal">0</div>
        </div>
        <div class="stat">
          <div class="k">На чекању</div>
          <div class="v" id="statPending">0</div>
        </div>
        <div class="stat">
          <div class="k">Одобрено</div>
          <div class="v" id="statApproved">0</div>
        </div>
        <div class="stat">
          <div class="k">Одбијено</div>
          <div class="v" id="statRejected">0</div>
        </div>
      </div>

      <div class="info-line">
        <div id="statusText">Спремно.</div>
        <div id="lastUpdate">Последње освежавање: —</div>
      </div>
    </div>

    <div class="panel">
      <div id="list" class="list">
        <div class="loading">Учитавање резервација...</div>
      </div>
    </div>

    <div class="footer-note">
      Ако се листа не учита, онда постојећи Google Apps Script мора да добије и део за читање и ажурирање статуса.
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyukXUq9oUwI8ZfjcGtPFrv4JnqCScdNHPBzbmQijwNuLOdBjz89-YQxrXagiEZaWw00g/exec";

    const state = {
      rows: [],
      filtered: []
    };

    const els = {
      list: document.getElementById("list"),
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      dateFilter: document.getElementById("dateFilter"),
      sortFilter: document.getElementById("sortFilter"),
      btnRefresh: document.getElementById("btnRefresh"),
      statusText: document.getElementById("statusText"),
      lastUpdate: document.getElementById("lastUpdate"),
      statTotal: document.getElementById("statTotal"),
      statPending: document.getElementById("statPending"),
      statApproved: document.getElementById("statApproved"),
      statRejected: document.getElementById("statRejected")
    };

    function setStatus(text){
      els.statusText.textContent = text;
    }

    function setLastUpdate(){
      const now = new Date();
      els.lastUpdate.textContent = "Последње освежавање: " + now.toLocaleString("sr-RS");
    }

    function esc(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function normStatus(v){
      const s = String(v || "").trim().toUpperCase();
      if (s === "ODOBRENO") return "ODOBRENO";
      if (s === "ODBIJENO") return "ODBIJENO";
      if (s === "NA CEKANJU" || s === "NA ČEKANJU" || s === "CEKANJE" || s === "ČEKANJE" || s === "PENDING") return "NA ČEKANJU";
      return s || "NA ČEKANJU";
    }

    function badgeClass(status){
      if (status === "ODOBRENO") return "approved";
      if (status === "ODBIJENO") return "rejected";
      return "pending";
    }

    function pick(obj, keys){
      for (const key of keys){
        if (obj && obj[key] != null && obj[key] !== "") return obj[key];
      }
      return "";
    }

    function normalizeRow(row, index){
      const id =
        pick(row, ["id","ID","rowId","rowID","timestamp","Timestamp","timeStamp"]) ||
        String(index + 1);

      const ime = pick(row, ["ime","Ime","name","Name","fullName","Full Name","full_name"]);
      const telefon = pick(row, ["telefon","Telefon","phone","Phone","broj","Broj"]);
      const datum = pick(row, ["datum","Datum","date","Date"]);
      const vreme = pick(row, ["vreme","Vreme","time","Time","termin","Termin"]);
      const status = normStatus(pick(row, ["status","Status","STATUS"]));
      const napomena = pick(row, ["napomena","Napomena","message","Message","poruka","Poruka","notes","Notes"]);
      const createdAt = pick(row, ["createdAt","CreatedAt","created_at","timestamp","Timestamp","submittedAt","Submitted At"]);

      return { raw: row, id, ime, telefon, datum, vreme, status, napomena, createdAt };
    }

    async function loadRows(){
      setStatus("Учитавање...");
      els.list.innerHTML = '<div class="loading">Учитавање резервација...</div>';

      try{
        const url = API_URL + "?action=list&_t=" + Date.now();
        const res = await fetch(url, { method:"GET" });
        const data = await res.json();

        let rows = [];
        if (Array.isArray(data)) rows = data;
        else if (Array.isArray(data.data)) rows = data.data;
        else if (Array.isArray(data.rows)) rows = data.rows;
        else if (Array.isArray(data.reservations)) rows = data.reservations;
        else rows = [];

        state.rows = rows.map(normalizeRow);
        applyFilters();
        setStatus("Учитано: " + state.rows.length + " резервација.");
        setLastUpdate();
      }catch(err){
        console.error(err);
        state.rows = [];
        els.list.innerHTML = `
          <div class="empty">
            Није могуће учитати резервације.<br><br>
            Овај admin.html је спреман, али Apps Script вероватно још нема <b>action=list</b> део.
          </div>
        `;
        setStatus("Грешка при учитавању.");
      }
    }

    function applyFilters(){
      const q = els.searchInput.value.trim().toLowerCase();
      const sf = els.statusFilter.value.trim();
      const df = els.dateFilter.value;
      const sort = els.sortFilter.value;

      let rows = [...state.rows];

      if (q){
        rows = rows.filter(r =>
          [r.ime, r.telefon, r.datum, r.vreme, r.status, r.napomena, r.createdAt]
            .join(" ")
            .toLowerCase()
            .includes(q)
        );
      }

      if (sf){
        rows = rows.filter(r => r.status === sf);
      }

      if (df){
        rows = rows.filter(r => normalizeDateStr(r.datum) === df);
      }

      rows.sort((a,b) => {
        const av = parseSortable(a);
        const bv = parseSortable(b);
        return sort === "oldest" ? av - bv : bv - av;
      });

      state.filtered = rows;
      renderStats();
      renderRows();
    }

    function normalizeDateStr(v){
      const s = String(v || "").trim();
      if (!s) return "";

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

      const m1 = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})\.?$/);
      if (m1){
        const dd = m1[1].padStart(2,"0");
        const mm = m1[2].padStart(2,"0");
        const yy = m1[3];
        return `${yy}-${mm}-${dd}`;
      }

      return "";
    }

    function parseSortable(r){
      const d = normalizeDateStr(r.datum);
      const t = String(r.vreme || "").trim();
      const base = d || "1970-01-01";
      const time = /^\d{1,2}:\d{2}$/.test(t) ? t : "00:00";
      return new Date(base + "T" + time + ":00").getTime() || 0;
    }

    function renderStats(){
      const total = state.rows.length;
      const pending = state.rows.filter(r => r.status === "NA ČEKANJU").length;
      const approved = state.rows.filter(r => r.status === "ODOBRENO").length;
      const rejected = state.rows.filter(r => r.status === "ODBIJENO").length;

      els.statTotal.textContent = total;
      els.statPending.textContent = pending;
      els.statApproved.textContent = approved;
      els.statRejected.textContent = rejected;
    }

    function renderRows(){
      if (!state.filtered.length){
        els.list.innerHTML = `<div class="empty">Нема резервација за овај филтер.</div>`;
        return;
      }

      els.list.innerHTML = state.filtered.map((r, i) => {
        const bClass = badgeClass(r.status);

        return `
          <div class="card">
            <div class="card-top">
              <div class="who">
                <h3>${esc(r.ime || "Без имена")}</h3>
                <div class="phone">${esc(r.telefon || "Без телефона")}</div>
              </div>
              <div class="badge ${bClass}">${esc(r.status)}</div>
            </div>

            <div class="grid">
              <div class="box">
                <div class="label">Датум</div>
                <div class="value">${esc(r.datum || "—")}</div>
              </div>
              <div class="box">
                <div class="label">Време</div>
                <div class="value">${esc(r.vreme || "—")}</div>
              </div>
              <div class="box">
                <div class="label">ID</div>
                <div class="value">${esc(r.id || String(i+1))}</div>
              </div>
              <div class="box">
                <div class="label">Послато</div>
                <div class="value">${esc(r.createdAt || "—")}</div>
              </div>
            </div>

            ${r.napomena ? `<div class="note">${esc(r.napomena)}</div>` : ""}

            <div class="row-actions">
              <button class="green" onclick="updateStatus('${escJs(r.id)}','ODOBRENO')">ОДОБРИ</button>
              <button class="red" onclick="updateStatus('${escJs(r.id)}','ODBIJENO')">ОДБИЈ</button>
              <button class="yellow" onclick="updateStatus('${escJs(r.id)}','NA ČEKANJU')">ВРАТИ НА ЧЕКАЊЕ</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function escJs(v){
      return String(v ?? "").replaceAll("\\","\\\\").replaceAll("'","\\'");
    }

    async function updateStatus(id, status){
      const ok = confirm("Да ли си сигуран?\n\nID: " + id + "\nНови статус: " + status);
      if (!ok) return;

      setStatus("Снимање статуса...");

      try{
        const body = new URLSearchParams();
        body.append("action", "updateStatus");
        body.append("id", id);
        body.append("status", status);

        const res = await fetch(API_URL, {
          method: "POST",
          body
        });

        let data = null;
        try { data = await res.json(); } catch(e){}

        if (!res.ok){
          throw new Error("HTTP " + res.status);
        }

        const row = state.rows.find(r => String(r.id) === String(id));
        if (row) row.status = status;

        applyFilters();
        setStatus("Статус је ажуриран.");
        setLastUpdate();

        if (data && data.message){
          setStatus(data.message);
        }
      }catch(err){
        console.error(err);
        setStatus("Није успело ажурирање. Потребан је Apps Script део за updateStatus.");
        alert("Овај admin.html је спреман, али Apps Script вероватно још нема action=updateStatus.");
      }
    }

    els.searchInput.addEventListener("input", applyFilters);
    els.statusFilter.addEventListener("change", applyFilters);
    els.dateFilter.addEventListener("change", applyFilters);
    els.sortFilter.addEventListener("change", applyFilters);
    els.btnRefresh.addEventListener("click", loadRows);

    loadRows();
  </script>
</body>
</html>
