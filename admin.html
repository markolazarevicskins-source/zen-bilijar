<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN Bilijar Admin</title>

<style>
body{
font-family:Arial;
background:#0f1218;
color:white;
padding:30px;
}

.panel{
background:#181d26;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#00c2ff;
color:black;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>🎱 ZEN BILIJAR ADMIN</h1>

<div class="panel">
<h3>Pretraga rezervacije</h3>

<input id="phone" placeholder="Telefon">
<input id="code" placeholder="Šifra rezervacije">

<button onclick="lookup()">Pretraži</button>

<div id="result"></div>
</div>

<div class="panel">
<h3>Promena statusa</h3>

<input id="statusCode" placeholder="Šifra rezervacije">

<select id="status">
<option value="Na čekanju">Na čekanju</option>
<option value="Potvrđeno">Potvrđeno</option>
<option value="Otkazano">Otkazano</option>
<option value="Završeno">Završeno</option>
</select>

<button onclick="updateStatus()">Promeni status</button>

<div id="statusResult"></div>
</div>

<script>

const API="PASTE_TVOJ_GOOGLE_SCRIPT_URL_OVDE";

async function lookup(){

const phone=document.getElementById("phone").value;
const code=document.getElementById("code").value;

let url=API+"?action=lookup";

if(phone) url+="&telefon="+phone;
if(code) url+="&sifra="+code;

const res=await fetch(url);
const data=await res.json();

show(data);

}

function show(data){

const div=document.getElementById("result");

if(!data.ok){
div.innerHTML="Nema rezultata";
return;
}

const r=data.reservation;

div.innerHTML=`
<table>
<tr>
<th>Šifra</th>
<th>Ime</th>
<th>Telefon</th>
<th>Datum</th>
<th>Termin</th>
<th>Status</th>
</tr>

<tr>
<td>${r.code}</td>
<td>${r.name}</td>
<td>${r.phone}</td>
<td>${r.date}</td>
<td>${r.time}</td>
<td>${r.status}</td>
</tr>
</table>
`;

}

async function updateStatus(){

const code=document.getElementById("statusCode").value;
const status=document.getElementById("status").value;

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"adminUpdateStatus",
code:code,
status:status
})
});

document.getElementById("statusResult").innerText="Status promenjen.";

}

</script>

</body>
</html>
